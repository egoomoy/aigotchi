version: 2

project_name: aigotchi

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/aigotchi
    binary: aigotchi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: egoomoy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/egoomoy/aigotchi
    description: "Terminal Tamagotchi that grows with your Claude Code token usage"
    install: |
      bin.install "aigotchi"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
